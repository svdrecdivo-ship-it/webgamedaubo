<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ĐẦU BÒ</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 20px; text-align: center;
            transition: background 3s ease; background-color: #fdfcf0; 
            min-height: 100vh; overflow-x: hidden;
            cursor: pointer; /* Để người dùng biết là bấm vào nền được */
        }
        
        h1 { display: flex; align-items: center; justify-content: center; gap: 20px; font-size: 3.5em; margin: 40px 0; pointer-events: none; }

        /* MEME RƠI SIÊU TO */
        .meme-fall {
            position: fixed; top: -250px; z-index: 9999; pointer-events: none;
            animation: fall linear infinite; border: 4px solid #000; background: #fff;
            border-radius: 20px; padding: 10px; box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
        }
        @keyframes fall { to { transform: translateY(125vh) rotate(360deg); } }

        /* LƯỚI GAME */
        .game-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; max-width: 1300px; margin: 0 auto; position: relative; z-index: 10;
        }
        .game-card { 
            border: 6px solid #000; border-radius: 25px; overflow: hidden; 
            background: #fff; box-shadow: 15px 15px 0 #000; transition: 0.2s;
        }
        .game-card:hover { transform: scale(1.02); }
        .game-card img { width: 100%; height: 220px; object-fit: cover; border-bottom: 6px solid #000; }
        .game-card h3 { margin: 15px 0; text-transform: uppercase; letter-spacing: 2px; }

        /* ĐIỀU KHIỂN NHẠC */
        .music-ui { 
            position: fixed; bottom: 30px; left: 30px; z-index: 10001; 
            background: #fff; padding: 15px; border: 4px solid #000; 
            border-radius: 60px; display: flex; gap: 15px; box-shadow: 8px 8px 0 #000;
        }
        .m-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #000; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; font-size: 22px; }

        /* MODAL GAME (NHÚNG IFRAME) */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; }
        .inner-box { width: 95%; height: 90%; margin: 1% auto; position: relative; border: 4px solid #fff; background: #fff; }
        .btn-close { position: absolute; top: -50px; right: 0; color: #fff; font-size: 30px; cursor: pointer; font-weight: bold; background: #000; padding: 5px 15px; border: 2px solid #fff; }

        footer { margin-top: 80px; padding: 30px; border-top: 5px solid #000; background: #fff; position: relative; z-index: 100; }
    </style>
</head>
<body id="bg-target">

    <audio id="track" loop></audio>

    <div class="music-ui" onclick="event.stopPropagation()">
        <div class="m-btn" onclick="toggleM()">⏯️</div>
        <div class="m-btn" onclick="nextM()">⏭️</div>
    </div>

    <h1>🎮 GAME ĐẦU BÒ 🎮</h1>

    <div class="game-grid">
        <div class="game-card" onclick="show('https://cdn.clickerheroes.com/gamebuild/index.php')">
            <img src="clicker-heroes-bua.png">
            <h3>Clicker Heroes</h3>
        </div>
        <div class="game-card" onclick="show('https://playsaurus.com/kongPokerQuest63/')">
            <img src="poker-quest-bua.png">
            <h3>Poker Quest</h3>
        </div>
        <div class="game-card" onclick="show('https://grindcraft.com/game.php')">
            <img src="grindcraft-bua.png">
            <h3>Grindcraft</h3>
        </div>
        <div class="game-card" onclick="show('https://frayfight.com/game/')">
            <img src="fray-fight-bua.png">
            <h3>Fray Fight</h3>
        </div>
        <div class="game-card" onclick="show('https://mrmine.com/game/')">
            <img src="mr-mine-bua.png">
            <h3>Mr. Mine</h3>
        </div>
    </div>

    <div id="modal-game" class="overlay">
        <div class="inner-box">
            <span class="btn-close" onclick="hide()">ĐÓNG [X]</span>
            <iframe id="game-ifr" style="width:100%; height:100%; border: 0;" scrolling="no" allow="autoplay *; payment *; fullscreen *; microphone *; focus-without-user-activation *; screen-wake-lock *; gamepad *; clipboard-read *; clipboard-write *;" src=""></iframe>
        </div>
    </div>

    <footer>
        <div style="font-weight: bold; letter-spacing: 3px; font-size: 1.2em;">DESIGNED BY NAM KO HỀ</div>
        <div style="margin-top: 10px;">Email: <a href="mailto:svdrecdivo@gmail.com" style="color: #000; font-weight: bold;">svdrecdivo@gmail.com</a></div>
    </footer>

    <script>
        // 1. XỬ LÝ NHẠC
        let list = ['nhac1.mp3', 'nhac2.mp3', 'nhac3.mp3'];
        let idx = 0;
        let player = document.getElementById('track');
        player.src = list[idx];

        function toggleM() {
            if (player.paused) { player.play(); } 
            else { player.pause(); }
        }
        function nextM() {
            idx = (idx + 1) % list.length;
            player.src = list[idx];
            player.play();
        }

        // BẬT/TẮT NHẠC KHI CHẠM VÀO NỀN
        document.body.onclick = function(e) {
            if(e.target.id === "bg-target") {
                toggleM();
            }
        }

        // 2. NỀN TỰ ĐỔI MÀU (Mỗi 4 giây)
        let palette = ['#fdfcf0', '#e3f2fd', '#fce4ec', '#f1f8e9', '#fff3e0', '#f3e5f5', '#e0f2f1'];
        setInterval(() => {
            document.body.style.background = palette[Math.floor(Math.random() * palette.length)];
        }, 4000);

        // 3. MEME RƠI SIÊU TO (160px)
        let memes = ['meme1.png','meme2.png','meme3.png','meme4.png','meme5.png'];
        function drop() {
            let img = document.createElement('img');
            img.className = 'meme-fall';
            img.src = memes[Math.floor(Math.random() * memes.length)];
            img.style.width = '160px'; 
            img.style.left = Math.random() * 90 + 'vw';
            img.style.animationDuration = Math.random() * 2 + 4 + 's';
            document.body.appendChild(img);
            setTimeout(() => img.remove(), 7000);
        }
        setInterval(drop, 1500);

        // 4. MỞ/ĐÓNG GAME
        function show(link) {
            document.getElementById('game-ifr').src = link;
            document.getElementById('modal-game').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        function hide() {
            document.getElementById('modal-game').style.display = 'none';
            document.getElementById('game-ifr').src = '';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
