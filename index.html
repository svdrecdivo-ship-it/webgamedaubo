<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ĐẦU BÒ CỦA NAM </title>
    <style>
        /* HIỆU ỨNG NỀN SÁNG NHẤP NHÁY ĐỔI MÀU */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #000; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 100px; 
            
            /* Hiệu ứng gradient nền sáng rực rỡ */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBackground 8s ease infinite;
        }

        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { 
            color: #000; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin: 40px 0; 
            font-size: 3em;
            text-shadow: 2px 2px 5px rgba(255,255,255,0.5);
        }

        /* Lưới hiển thị game bự hơn */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 40px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        
        /* Thẻ game trắng tinh khôi */
        .game-card { 
            background: #fff; 
            border-radius: 25px; 
            overflow: hidden; 
            transition: 0.4s; 
            border: 4px solid #000; 
            cursor: pointer; 
            box-shadow: 0 10px 0 #000; /* Hiệu ứng đổ bóng đổ khối */
        }
        .game-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            box-shadow: 0 20px 0 #000;
        }

        /* AVATAR GAME SIÊU TO */
        .game-card img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-bottom: 4px solid #000;
        }
        .game-info { padding: 25px; }
        .game-info h3 { margin: 0; font-size: 1.8em; color: #000; text-transform: uppercase; }
        .game-info p { margin-top: 10px; color: #444; font-size: 1.1em; font-weight: 500; }

        /* Khung chơi game */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; }
        .modal-content { width: 95%; height: 90%; margin: 2% auto; background: #000; border: 5px solid #fff; border-radius: 20px; position: relative; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 15px; right: 25px; color: #fff; font-size: 35px; cursor: pointer; font-weight: bold; text-shadow: 0 0 10px #ff0000; }

        /* BẢN QUYỀN NAM TRẦN PRO */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 900;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>🎮 GAME ĐẦU BÒ</h1>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('https://mrmine.com/game/')">
            <img src="mr-mine-bua.png" alt="Mr. Mine">
            <div class="game-info">
                <h3>Mr. Mine</h3>
                <p>Khai thác hầm mỏ vô tận</p>
            </div>
        </div>

        <div class="game-card" onclick="openGame('https://cdn.clickerheroes.com/gamebuild/index.php')">
            <img src="clicker-heroes-bua.png" alt="Clicker Heroes">
            <div class="game-info">
                <h3>Clicker Heroes</h3>
                <p>Huyền thoại dòng game Idle</p>
            </div>
        </div>

        <div class="game-card" onclick="openGame('https://playsaurus.com/kongPokerQuest63/')">
            <img src="poker-quest-bua.png" alt="Poker Quest">
            <div class="game-info">
                <h3>Poker Quest</h3>
                <p>Chiến thuật thẻ bài Poker</p>
            </div>
        </div>

        <div class="game-card" onclick="openGame('https://grindcraft.com/game.php')">
            <img src="grindcraft-bua.png" alt="Grindcraft">
            <div class="game-info">
                <h3>Grindcraft</h3>
                <p>Chế tạo và xây dựng thế giới</p>
            </div>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeGame()">[ ĐÓNG ]</span>
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="footer">
        WEB ĐƯỢC THIẾT KẾ BỞI NAM KHÔNG HỀ - 2026
    </div>

    <script>
        function openGame(url) {
            document.getElementById('gameFrame').src = url;
            document.getElementById('gameModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').src = '';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
