<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ĐẦU BÒ</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 20px; text-align: center;
            transition: background 2s; background-color: #fdfcf0; 
            min-height: 100vh; overflow-x: hidden;
        }
        
        /* TIÊU ĐỀ 2 MÁY CHƠI GAME */
        h1 { display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 3em; margin: 30px 0; }
        
        /* MEME RƠI SIÊU TO */
        .meme-img {
            position: fixed; top: -250px; z-index: 9999; pointer-events: none;
            animation: fall linear infinite; border: 4px solid #000; background: #fff;
            border-radius: 20px; padding: 10px;
        }
        @keyframes fall { to { transform: translateY(125vh) rotate(360deg); } }

        /* LƯỚI GAME */
        .game-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; max-width: 1200px; margin: 0 auto; 
        }
        .game-item { 
            border: 5px solid #000; border-radius: 20px; overflow: hidden; 
            cursor: pointer; background: #fff; box-shadow: 12px 12px 0 #000; 
            transition: 0.2s;
        }
        .game-item:hover { transform: scale(1.03); }
        .game-item img { width: 100%; height: 200px; object-fit: cover; border-bottom: 5px solid #000; }
        .game-item h3 { margin: 15px 0; text-transform: uppercase; }

        /* NHẠC CỐ ĐỊNH */
        .music-ctrl { 
            position: fixed; bottom: 30px; left: 30px; z-index: 10000; 
            background: #fff; padding: 15px; border: 4px solid #000; 
            border-radius: 60px; display: flex; gap: 15px; box-shadow: 8px 8px 0 #000;
        }
        .m-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #000; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; font-size: 22px; }

        /* MODAL MỞ GAME (EMBED) */
        .game-overlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; 
        }
        .game-box { width: 95%; height: 85%; margin: 2% auto; position: relative; border: 5px solid #fff; background: #000; }
        .close-game { position: absolute; top: -50px; right: 0; color: #fff; font-size: 35px; cursor: pointer; font-weight: bold; }

        footer { margin-top: 50px; padding: 20px; border-top: 4px solid #000; background: #fff; position: relative; z-index: 1000; }
    </style>
</head>
<body id="b">

    <div class="music-ctrl">
        <div class="m-btn" onclick="p()">▶️</div>
        <div class="m-btn" onclick="n()">⏭️</div>
    </div>

        <div class="game-item" onclick="openG('https://cdn.clickerheroes.com/gamebuild/index.php')"><img src="clicker-heroes-bua.png"><h3>CLICKER HEROES</h3></div>
        <div class="game-item" onclick="openG('https://playsaurus.com/kongPokerQuest63/')"><img src="poker-quest-bua.png"><h3>POKER QUEST</h3></div>
        <div class="game-item" onclick="openG('https://grindcraft.com/game.php')"><img src="grindcraft-bua.png"><h3>GRINDCRAFT</h3></div>
    </div>

    <div id="ovl" class="game-overlay">

            <span class="close-game" onclick="closeG()">[ ĐÓNG ]</span>
            <iframe id="ifr" src="" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        <div style="font-weight: bold; letter-spacing: 2px;">DESIGNED BY NAM TRAN ko Hề</div>
        <div style="font-size: 0.9em; margin-top: 5px;">svdrecdivo@gmal.com</div>
    </footer>

        // TỰ ĐỔI MÀU NỀN

        setInterval(() => {
            document.body.style.background = clr[Math.floor(Math.random() * clr.length)];
        }, 3000);

        function spawn() {

            m.src = mImg[Math.floor(Math.random() * mImg.length)];

            m.style.left = Math.random() * 90 + 'vw';
            m.style.animationDuration = Math.random() * 2 + 4 + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 7000);
        }
        setInterval(spawn, 1500);
