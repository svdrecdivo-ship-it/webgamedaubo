<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ĐẦU BÒ</title>
    <style>
        :root {
            --bg-color: #fdfcf0;
            --accent: #000;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 20px; text-align: center;
            min-height: 100vh; overflow-x: hidden;
            cursor: pointer;
            position: relative;
            background: var(--bg-color);
            transition: background 2s ease;
        }

        /* LỚP NỀN CHI TIẾT: HIỆU ỨNG LƯỚI (GRID) */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 50px 50px; /* Độ rộng của lưới */
            z-index: -2;
            pointer-events: none;
        }

        /* LỚP NỀN CHI TIẾT: GRADIENT CHUYỂN ĐỘNG */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2), transparent);
            z-index: -1;
            pointer-events: none;
        }

        h1 { 
            display: flex; align-items: center; justify-content: center; gap: 20px; 
            font-size: 3.8em; margin: 40px 0; pointer-events: none;
            text-shadow: 5px 5px 0px #fff;
            -webkit-text-stroke: 2px #000;
        }

        /* MEME RƠI SIÊU TO */
        .meme-fall {
            position: fixed; top: -250px; z-index: 9999; pointer-events: none;
            animation: fall linear infinite; border: 4px solid #000; background: #fff;
            border-radius: 20px; padding: 10px; box-shadow: 10px 10px 0 rgba(0,0,0,0.2);
        }
        @keyframes fall { to { transform: translateY(125vh) rotate(360deg); } }

        /* LƯỚI GAME */
        .game-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; max-width: 1300px; margin: 0 auto; position: relative; z-index: 10;
        }
        .game-card { 
            border: 6px solid #000; border-radius: 25px; overflow: hidden; 
            background: #fff; box-shadow: 15px 15px 0 #000; transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-10px) rotate(1deg); }
        .game-card img { width: 100%; height: 220px; object-fit: cover; border-bottom: 6px solid #000; }
        .game-card h3 { margin: 15px 0; text-transform: uppercase; letter-spacing: 2px; }

        /* ĐIỀU KHIỂN NHẠC */
        .music-ui { 
            position: fixed; bottom: 30px; left: 30px; z-index: 10001; 
            background: #fff; padding: 15px; border: 4px solid #000; 
            border-radius: 60px; display: flex; gap: 15px; box-shadow: 8px 8px 0 #000;
        }
        .m-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #000; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; font-size: 22px; }

        /* MODAL GAME */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; }
        .inner-box { width: 95%; height: 90%; margin: 1% auto; position: relative; border: 4px solid #fff; background: #fff; }
        .btn-close { position: absolute; top: -50px; right: 0; color: #fff; font-size: 25px; cursor: pointer; background: #000; padding: 5px 15px; border: 2px solid #fff; }

        footer { 
            margin-top: 100px; padding: 40px; border-top: 6px solid #000; background: #fff; 
            position: relative; z-index: 100; box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body id="bg-target">

    <audio id="track" loop></audio>

    <div class="music-ui" onclick="event.stopPropagation()">
        <div class="m-btn" onclick="toggleM()">⏯️</div>
        <div class="m-btn" onclick="nextM()">⏭️</div>
    </div>

    <h1>🎮 GAME ĐẦU BÒ 🎮</h1>

    <div class="game-grid">
        <div class="game-card" onclick="show('https://cdn.clickerheroes.com/gamebuild/index.php')">
            <img src="clicker-heroes-bua.png">
            <h3>Clicker Heroes</h3>
        </div>
        <div class="game-card" onclick="show('https://playsaurus.com/kongPokerQuest63/')">
            <img src="poker-quest-bua.png">
            <h3>Poker Quest</h3>
        </div>
        <div class="game-card" onclick="show('https://grindcraft.com/game.php')">
            <img src="grindcraft-bua.png">
            <h3>Grindcraft</h3>
        </div>
        <div class="game-card" onclick="show('https://frayfight.com/game/')">
            <img src="fray-fight-bua.png">
            <h3>Fray Fight</h3>
        </div>
        <div class="game-card" onclick="show('https://mrmine.com/game/')">
            <img src="mr-mine-bua.png">
            <h3>Mr. Mine</h3>
        </div>

        <div class="game-card" onclick="show('https://zv1y2i8p.play.gamezop.com/g/9lpHai56Q')">
            <img src="https://static.gamezop.com/9lpHai56Q/square.png">
            <h3>City Cricket</h3>
        </div>
        <div class="game-card" onclick="show('https://zv1y2i8p.play.gamezop.com/g/sOlUZe45d')">
            <img src="https://static.gamezop.com/sOlUZe45d/square.png">
            <h3>Bottle Shoot</h3>
        </div>
        <div class="game-card" onclick="show('https://zv1y2i8p.play.gamezop.com/g/rkxMV8TI6Wg')">
            <img src="https://static.gamezop.com/rkxMV8TI6Wg/square.png">
            <h3>Tower Twist</h3>
        </div>
        <div class="game-card" onclick="show('https://zv1y2i8p.play.gamezop.com/g/SyfxJ3a75Cr')">
            <img src="https://static.gamezop.com/SyfxJ3a75Cr/square.png">
            <h3>Bubble Wipeout</h3>
        </div>
    </div>

    <div id="modal-game" class="overlay">
        <div class="inner-box">
            <span class="btn-close" onclick="hide()">ĐÓNG [X]</span>
            <iframe id="game-ifr" style="width:100%; height:100%; border: 0;" allow="autoplay *; payment *; fullscreen *; gamepad *; clipboard-read *; clipboard-write *;" src=""></iframe>
        </div>
    </div>

    <footer>
        <div style="font-weight: 900; letter-spacing: 4px; font-size: 1.5em; text-transform: uppercase;">DESIGNED BY NAM KO HỀ</div>
        <div style="margin-top: 15px; font-weight: bold;">Liên hệ: <a href="mailto:svdrecdivo@gmail.com" style="color: #000; text-decoration: underline;">svdrecdivo@gmail.com</a></div>
    </footer>

    <script>
        // GIỮ NGUYÊN 100% SCRIPT CỦA NAM ĐỂ KHÔNG MẤT NHẠC VÀ MEME
        let list = ['nhac1.mp3', 'nhac2.mp3', 'nhac3.mp3'];
        let idx = 0;
        let player = document.getElementById('track');
        player.src = list[idx];

        function toggleM() {
            if (player.paused) { player.play(); } 
            else { player.pause(); }
        }
        function nextM() {
            idx = (idx + 1) % list.length;
            player.src = list[idx];
            player.play();
        }

        document.addEventListener('click', function(e) {
            if(e.target.id === "bg-target") {
                toggleM();
            }
        });

        let palette = ['#fdfcf0', '#e3f2fd', '#fce4ec', '#f1f8e9', '#fff3e0', '#f3e5f5', '#e0f2f1'];
        setInterval(() => {
            const newColor = palette[Math.floor(Math.random() * palette.length)];
            document.body.style.background = newColor;
        }, 4000);

        let memes = ['meme1.png','meme2.png','meme3.png','meme4.png','meme5.png'];
        function drop() {
            let img = document.createElement('img');
            img.className = 'meme-fall';
            img.src = memes[Math.floor(Math.random() * memes.length)];
            img.style.width = '180px'; 
            img.style.left = Math.random() * 90 + 'vw';
            img.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(img);
            setTimeout(() => img.remove(), 8000);
        }
        setInterval(drop, 1600);

        function show(link) {
            document.getElementById('game-ifr').src = link;
            document.getElementById('modal-game').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        function hide() {
            document.getElementById('modal-game').style.display = 'none';
            document.getElementById('game-ifr').src = '';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
