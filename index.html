<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ĐẦU BÒ </title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #000; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 150px; 
            overflow-x: hidden;
            transition: background 0.5s ease;
            min-height: 100vh;
            cursor: pointer;
            background-color: #fdfcf0;
        }

        /* MEME RƠI */
        .particle {
            position: fixed; top: -150px; z-index: -1;
            user-select: none; pointer-events: none;
            animation: fall linear infinite;
            border-radius: 10px; border: 2px solid #000;
            background: #fff; padding: 5px;
        }
        @keyframes fall { to { transform: translateY(120vh) rotate(360deg); } }

        /* NHẠC */
        .music-panel {
            position: fixed; bottom: 30px; left: 30px;
            display: flex; gap: 12px; z-index: 1001;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px; border: 3px solid #000;
            border-radius: 50px; box-shadow: 6px 6px 0 #000;
        }
        .music-btn {
            width: 50px; height: 50px;
            background: #fff; border: 2px solid #000;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: 0.2s;
        }
        .music-btn:active { transform: scale(0.9); }
        .playing { animation: spin 4s linear infinite; background: #00ffcc !important; }
        @keyframes spin { to { transform: rotate(360deg); } }

        h1 { 
            color: #000; text-transform: uppercase; letter-spacing: 5px; 
            margin: 50px 0; font-size: 3.2em; text-shadow: 3px 3px 0px #fff;
            display: flex; align-items: center; justify-content: center; gap: 20px;
            pointer-events: none;
        }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }
        .game-card { 
            background: #fff; border-radius: 20px; 
            overflow: hidden; transition: 0.3s; border: 4px solid #000; 
            cursor: pointer; box-shadow: 8px 8px 0 #000;
        }
        .game-card:hover { transform: translateY(-8px); }
        .game-card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 4px solid #000; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #fff; border-top: 3px solid #000;
            padding: 12px 0; z-index: 1000;
        }
        .footer-line { font-size: 0.9em; font-weight: bold; text-transform: uppercase; }
        .footer-email { font-size: 0.8em; color: #666; text-decoration: none; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; }
        .modal-content { width: 95%; height: 85%; margin: 2% auto; background: #000; border: 3px solid #fff; position: relative; }
        .close-btn { position: absolute; top: -40px; right: 0; color: #fff; font-size: 25px; cursor: pointer; }
    </style>
</head>
<body id="main-body">

    <audio id="bg-music" preload="auto"></audio>

    <div class="music-panel">
        <div id="play-btn" class="music-btn" onclick="toggleMusic(event)">▶️</div>
        <div class="music-btn" onclick="nextTrack(event)">⏭️</div>
    </div>

    <h1>🎮 GAME ĐẦU BÒ 🎮</h1>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('https://frayfight.com/game/')">
            <img src="fray-fight-bua.png">
            <div class="game-info"><h3>Fray Fight</h3></div>
        </div>
        <div class="game-card" onclick="openGame('https://mrmine.com/game/')">
            <img src="mr-mine-bua.png">
            <div class="game-info"><h3>Mr. Mine</h3></div>
        </div>
        <div class="game-card" onclick="openGame('https://cdn.clickerheroes.com/gamebuild/index.php')">
            <img src="clicker-heroes-bua.png">
            <div class="game-info"><h3>Clicker Heroes</h3></div>
        </div>
        <div class="game-card" onclick="openGame('https://playsaurus.com/kongPokerQuest63/')">
            <img src="poker-quest-bua.png">
            <div class="game-info"><h3>Poker Quest</h3></div>
        </div>
        <div class="game-card" onclick="openGame('https://grindcraft.com/game.php')">
            <img src="grindcraft-bua.png">
            <div class="game-info"><h3>Grindcraft</h3></div>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeGame()">[ ĐÓNG ]</span>
            <iframe id="gameFrame" src="" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <footer>
        <div class="footer-line">Designed by Nam Tran ko Hề </div>
        <a href="mailto:svdrecdivo@gmal.com" class="footer-email">svdrecdivo@gmal.com</a>
    </footer>

    <script>
        // 1. ĐỔI MÀU NỀN - Gán trực tiếp vào sự kiện click của body
        const colors = ['#fdfcf0', '#e3f2fd', '#fce4ec', '#f1f8e9', '#fff3e0', '#f3e5f5', '#e0f2f1', '#fffde7'];
        document.getElementById('main-body').addEventListener('click', function(e) {
            // Chỉ đổi màu khi click vào vùng trống (nền), không click vào nút nhạc/game
            if (e.target.tagName === 'BODY' || e.target.tagName === 'H1') {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                this.style.background = randomColor;
            }
        });

        // 2. NHẠC
        const playlist = ['nhac1.mp3', 'nhac2.mp3', 'nhac3.mp3'];
        let currentTrack = 0;
        const music = document.getElementById('bg-music');
        const playBtn = document.getElementById('play-btn');
        music.src = playlist[currentTrack];

        function toggleMusic(e) {
            e.stopPropagation(); // Ngăn đổi màu nền khi bấm nút nhạc
            if (music.paused) {
                music.play().catch(err => alert("Hãy tương tác với trang web trước khi phát nhạc!"));
                playBtn.innerText = '⏸️';
                playBtn.classList.add('playing');
            } else {
                music.pause();
                playBtn.innerText = '▶️';
                playBtn.classList.remove('playing');
            }
        }

        function nextTrack(e) {
            e.stopPropagation();
            currentTrack = (currentTrack + 1) % playlist.length;
            music.src = playlist[currentTrack];
            music.play();
            playBtn.innerText = '⏸️';
            playBtn.classList.add('playing');
        }

        music.onended = function() { nextTrack({stopPropagation: () => {}}); };

        // 3. MEME RƠI
        const memeImages = ['meme1.png','meme2.png','meme3.png','meme4.png','meme5.png'];
        function createParticle() {
            const particle = document.createElement('img');
            particle.classList.add('particle');
            particle.src = memeImages[Math.floor(Math.random() * memeImages.length)];
            particle.style.width = (Math.random() * 40 + 40) + 'px';
            particle.style.left = Math.random() * 1
