<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ĐẦU BÒ </title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 20px; padding-bottom: 150px; 
            overflow-x: hidden; min-height: 100vh;
            transition: background 3s ease; /* Nền chuyển màu mượt mà */
            background-color: #fdfcf0;
        }

        /* MEME RƠI - LÀM TO HƠN */
        .particle {
            position: fixed; top: -200px; z-index: 1005;
            user-select: none; pointer-events: none;
            animation: fall linear infinite;
            border: 3px solid #000; background: #fff; padding: 8px;
            border-radius: 15px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.2);
        }
        @keyframes fall { to { transform: translateY(125vh) rotate(360deg); } }

        /* BỘ ĐIỀU KHIỂN */
        .music-panel {
            position: fixed; bottom: 30px; left: 30px;
            display: flex; gap: 15px; z-index: 2001;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px; border: 4px solid #000;
            border-radius: 50px; box-shadow: 8px 8px 0 #000;
        }
        .music-btn {
            width: 55px; height: 55px; background: #fff; border: 3px solid #000;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 22px;
        }
        .playing { animation: spin 4s linear infinite; background: #00ffcc !important; }
        @keyframes spin { to { transform: rotate(360deg); } }

        h1 { 
            font-size: 3.5em; text-transform: uppercase; letter-spacing: 5px;
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin: 50px 0; text-shadow: 4px 4px 0 #fff;
        }

        .game-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; max-width: 1300px; margin: 0 auto;
        }
        .game-card { 
            background: #fff; border-radius: 20px; border: 4px solid #000; 
            overflow: hidden; cursor: pointer; box-shadow: 10px 10px 0 #000;
            transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-10px); }
        .game-card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 4px solid #000; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #fff; border-top: 4px solid #000; padding: 15px 0; z-index: 2000;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; }
        .modal-content { width: 95%; height: 90%; margin: 1% auto; position: relative; border: 5px solid #fff; }
        .close-btn { position: absolute; top: -45px; right: 0; color: #fff; font-size: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body id="main-body">

    <audio id="bg-music" loop></audio>

    <div class="music-panel">
        <div id="play-btn" class="music-btn" onclick="toggleMusic()">▶️</div>
        <div class="music-btn" onclick="nextTrack()">⏭️</div>
    </div>

    <h1>🎮 GAME ĐẦU BÒ 🎮</h1>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('https://frayfight.com/game/')">
            <img src="fray-fight-bua.png">
            <h3>Fray Fight</h3>
        </div>
        <div class="game-card" onclick="openGame('https://mrmine.com/game/')">
            <img src="mr-mine-bua.png">
            <h3>Mr. Mine</h3>
        </div>
        <div class="game-card" onclick="openGame('https://cdn.clickerheroes.com/gamebuild/index.php')">
            <img src="clicker-heroes-bua.png">
            <h3>Clicker Heroes</h3>
        </div>
        <div class="game-card" onclick="openGame('https://playsaurus.com/kongPokerQuest63/')">
            <img src="poker-quest-bua.png">
            <h3>Poker Quest</h3>
        </div>
        <div class="game-card" onclick="openGame('https://grindcraft.com/game.php')">
            <img src="grindcraft-bua.png">
            <h3>Grindcraft</h3>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeGame()">[ ĐÓNG ]</span>
            <iframe id="gameFrame" src="" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <footer>
        <div style="font-weight: bold;">DESIGNED BY NAM TRAN ko Hề</div>
        <div style="font-size: 0.8em; color: #666;">svdrecdivo@gmal.com</div>
    </footer>

    <script>
        const playlist = ['nhac1.mp3', 'nhac2.mp3', 'nhac3.mp3'];
        let currentTrack = 0;
        const music = document.getElementById('bg-music');
        const playBtn = document.getElementById('play-btn');
        let hasInteracted = false;

        music.src = playlist[currentTrack];

        // TỰ ĐỘNG PHÁT KHI CLICK BẤT KỲ ĐÂU LẦN ĐẦU
        document.body.addEventListener('click', () => {
            if (!hasInteracted) {
                music.play().catch(() => {});
                playBtn.innerText = '⏸️';
                playBtn.classList.add('playing');
                hasInteracted = true;
            }
        }, { once: true });

        function toggleMusic() {
            if (music.paused) { music.play(); playBtn.innerText = '⏸️'; playBtn.classList.add('playing'); }
            else { music.pause(); playBtn.innerText = '▶️'; playBtn.classList.remove('playing'); }
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            music.src = playlist[currentTrack];
            music.play();
            playBtn.innerText = '⏸️';
            playBtn.classList.add('playing');
        }

        // TỰ ĐỘNG ĐỔI MÀU NỀN MỖI 3 GIÂY
        const colors = ['#fdfcf0', '#e3f2fd', '#fce4ec', '#f1f8e9', '#fff3e0', '#f3e5f5', '#e0f2f1', '#fffde7'];
        setInterval(() => {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.background = randomColor;
        }, 3000);

        // MEME RƠI - KÍCH THƯỚC TO
        const memeImages = ['meme1.png','meme2.png','meme3.png','meme4.png','meme5.png'];
        function createMeme() {
            const m = document.createElement('img');
            m.className = 'particle';
            m.src = memeImages[Math.floor(Math.random() * memeImages.length)];
            const size = Math.random() * 60 + 80; // To từ 80px đến 140px
            m.style.width = size + 'px';
            m.style.left = Math.random() * 100 + 'vw';
            m.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 8000);
        }
        setInterval(createMeme, 1200);

        function openGame(url) {
            document.getElementById('gameFrame').src = url;
            document.getElementById('gameModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').src = '';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
