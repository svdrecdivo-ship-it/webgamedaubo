<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ĐẦU BÒ </title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #000; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 150px; 
            overflow-x: hidden;
            transition: background 0.6s ease;
            min-height: 100vh;
            cursor: pointer;
            background: #fdfcf0;
        }

        /* MEME RƠI */
        .particle {
            position: fixed; top: -150px; z-index: -1;
            user-select: none; pointer-events: none;
            animation: fall linear infinite;
            border-radius: 10px; border: 2px solid #000;
            background: #fff; padding: 5px;
        }
        @keyframes fall { to { transform: translateY(120vh) rotate(360deg); } }

        /* BẢNG ĐIỀU KHIỂN NHẠC */
        .music-panel {
            position: fixed; bottom: 30px; left: 30px;
            display: flex; gap: 12px; z-index: 1001;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px; border: 3px solid #000;
            border-radius: 50px; box-shadow: 6px 6px 0 #000;
        }
        .music-btn {
            width: 45px; height: 45px;
            background: #fff; border: 2px solid #000;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: 0.2s;
        }
        .music-btn:hover { background: #000; color: #fff; }
        .playing { animation: spin 4s linear infinite; background: #00ffcc !important; color: #000 !important; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TIÊU ĐỀ CÓ 2 MÁY CHƠI GAME */
        h1 { 
            color: #000; text-transform: uppercase; letter-spacing: 5px; 
            margin: 50px 0; font-size: 3.5em; text-shadow: 4px 4px 0px #fff;
            pointer-events: none;
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }

        /* LƯỚI GAME */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; max-width: 1300px; margin: 0 auto;
            cursor: default;
        }
        .game-card { 
            background: #fff; border-radius: 20px; 
            overflow: hidden; transition: 0.3s; border: 4px solid #000; 
            cursor: pointer; box-shadow: 10px 10px 0 #000;
        }
        .game-card:hover { transform: translateY(-8px); box-shadow: 15px 15px 0 #000; }
        .game-card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 4px solid #000; }
        .game-info h3 { margin: 15px 0; font-size: 1.3em; text-transform: uppercase; }

        /* FOOTER */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #fff; border-top: 3px solid #000;
            padding: 15px 0; z-index: 1000;
            display: flex; flex-direction: column; gap: 5px; cursor: default;
        }
        .footer-line { font-size: 0.9em; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .footer-email { font-size: 0.8em; color: #555; text-decoration: none; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1002; }
        .modal-content { width: 96%; height: 90%; margin: 1% auto; background: #000; border: 4px solid #fff; border-radius: 15px; position: relative; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 10px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; z-index: 1003; }
    </style>
</head>
<body onclick="changeBg()">

    <audio id="bg-music"></audio>

    <div class="music-panel" onclick="event.stopPropagation()">
        <div id="play-btn" class="music-btn" onclick="toggleMusic()">▶️</div>
        <div class="music-btn" onclick="nextTrack()">⏭️</div>
    </div>

    <h1>🎮 GAME ĐẦU BÒ 🎮</h1>

    <div class="game-grid" onclick="event.stopPropagation()">
        <div class="game-card" onclick="openGame('https://frayfight.com/game/')">
            <img src="fray-fight-bua.png" alt="Fray Fight">
            <div class="game-info"><h3>Fray Fight</h3><p>Chiến đấu sinh tồn cực đỉnh</p></div>
        </div>
        <div class="game-card" onclick="openGame('https://mrmine.com/game/')">
            <img src="mr-mine-bua.png" alt="Mr. Mine">
            <div class="game-info"><h3>Mr. Mine</h3><p>Khai thác hầm mỏ vô tận</p></div>
        </div>
        <div class="game-card" onclick="openGame('https://cdn.clickerheroes.com/gamebuild/index.php')">
            <img src="clicker-heroes-bua.png" alt="Clicker Heroes">
            <div class="game-info"><h3>Clicker Heroes</h3><p>Huyền thoại dòng game Idle</p></div>
        </div>
        <div class="game-card" onclick="openGame('https://playsaurus.com/kongPokerQuest63/')">
            <img src="poker-quest-bua.png" alt="Poker Quest">
            <div class="game-info"><h3>Poker Quest</h3><p>Chiến thuật thẻ bài Poker</p></div>
        </div>
        <div class="game-card" onclick="openGame('https://grindcraft.com/game.php')">
            <img src="grindcraft-bua.png" alt="Grindcraft">
            <div class="game-info"><h3>Grindcraft</h3><p>Chế tạo và xây dựng thế giới</p></div>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeGame()">[ ĐÓNG ]</span>
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <footer onclick="event.stopPropagation()">
        <div class="footer-line">Designed by Nam ko Hề</div>
        <a href="mailto:svdrecdivo@gmal.com" class="footer-email">svdrecdivo@gmal.com</a>
    </footer>

    <script>
        // 1. ĐỔI MÀU NỀN KHI CLICK
        const colors = ['#fdfcf0', '#e3f2fd', '#fce4ec', '#f1f8e9', '#fff3e0', '#f3e5f5', '#e0f2f1', '#fffde7'];
        function changeBg() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.background = randomColor;
        }

        // 2. MEME RƠI
        const memeImages = ['meme1.png','meme2.png','meme3.png','meme4.png','meme5.png'];
        function createParticle() {
            const particle = document.createElement('img');
            particle.classList.add('particle');
            particle.src = memeImages[Math.floor(Math.random() * memeImages.length)];
            const size = Math.random() * 40 + 40 + 'px';
            particle.style.width = size;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 4 + 3 + 's';
            document.body.appendChild(particle);
            setTimeout(() => { particle.remove(); }, 7000);
        }
        setInterval(createParticle, 800);

        // 3. NHẠC
        const playlist = ['nhac1.mp3', 'nhac2.mp3', 'nhac3.mp3'];
        let currentTrack = 0;
        const music = document.getElementById('bg-music');
        const playBtn = document.getElementById('play-btn');
        music.src = playlist[currentTrack];

        function toggleMusic() {
            if (music.paused) {
                music.play();
                playBtn.innerText = '⏸️';
                playBtn.classList.add('playing');
            } else {
                music.pause();
                playBtn.innerText = '▶️';
                playBtn.classList.remove('playing');
            }
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            music.src = playlist[currentTrack];
            music.play();
            playBtn.innerText = '⏸️';
            playBtn.classList.add('playing');
        }
        music.onended = nextTrack;

        // 4. MODAL MỞ GAME
        function openGame(url) {
            document.getElementById('gameFrame').src = url;
            document.getElementById('gameModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').src = '';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
